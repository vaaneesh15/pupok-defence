<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bounce.io</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bounce.io">
    <meta name="theme-color" id="theme-color-meta" content="#4a3aff">
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        body {
            --bg-gradient-start: #e9e9f0;
            --bg-gradient-end: #dadde8;
            --container-bg: rgba(240, 240, 245, 0.8);
            --text-primary: #1a1a2e;
            --text-secondary: #2c3e50;
            --text-muted: #6b6b80;
            --accent: #4a3aff;
            --accent-light: #7a6aff;
            --card-bg: rgba(255, 255, 255, 0.6);
            --shadow: 0 25px 40px -20px rgba(0,0,0,0.2);
            --icon-bg: white;
            --panel-bg: rgba(255, 255, 255, 0.8);
            --joystick-bg: rgba(255, 255, 255, 0.6);
            --joystick-handle: var(--accent);
            --health-color: #ff6b6b;
            --coin-color: #ffd966;
            
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-bg: rgba(26, 26, 46, 0.95);
            --text-primary: #f0f0ff;
            --text-secondary: #ecf0f1;
            --text-muted: #8a8aa0;
            --accent: #6d5fff;
            --accent-light: #9a8cff;
            --card-bg: rgba(40, 40, 55, 0.7);
            --shadow: 0 25px 40px -20px rgba(0,0,0,0.5);
            --icon-bg: #2a2a40;
            --panel-bg: rgba(30, 30, 46, 0.9);
            --joystick-bg: rgba(40, 40, 55, 0.8);
            --joystick-handle: #9a8cff;
            --health-color: #ff8a8a;
            --coin-color: #ffd966;
        }

        .game-container {
            width: 100%;
            height: 100vh;
            background: var(--container-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: var(--shadow);
            padding: max(20px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom)) 12px;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-shrink: 0;
            padding: 0 4px;
        }

        .health-panel {
            background: var(--panel-bg);
            border-radius: 40px;
            padding: 10px 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .health-panel i {
            color: var(--health-color);
        }

        #health-display {
            transition: color 0.2s;
        }

        .coin-panel {
            background: var(--panel-bg);
            border-radius: 40px;
            padding: 10px 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 8px;
        }

        .coin-panel i {
            color: var(--coin-color);
        }

        .right-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .speed-btn, .coin-rain-btn {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: none;
            color: var(--accent);
            font-size: 18px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .speed-btn:active, .coin-rain-btn:active, .pause-btn:active, .theme-toggle:active {
            transform: scale(0.94);
        }

        .pause-btn {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: none;
            color: var(--accent);
            font-size: 20px;
            flex-shrink: 0;
        }

        .theme-toggle {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: none;
            color: var(--accent);
            font-size: 20px;
            flex-shrink: 0;
        }

        .game-area {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 36px;
            padding: 0;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            margin-bottom: 12px;
            overflow: hidden;
            position: relative;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
            touch-action: none;
        }

        .joystick-panel {
            background: var(--panel-bg);
            border-radius: 36px;
            padding: 16px;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #joystick-canvas {
            width: 200px;
            height: 200px;
            background: var(--joystick-bg);
            border-radius: 100px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            touch-action: none;
        }

        @media (max-width: 480px) {
            #joystick-canvas {
                width: 150px;
                height: 150px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div style="display: flex; gap: 8px; align-items: center;">
                <div class="health-panel" id="health-panel">
                    <i class="fas fa-heart"></i>
                    <span id="health-display">90</span>
                </div>
                <div class="coin-panel">
                    <i class="fas fa-coins"></i>
                    <span id="coin-display">0</span>
                </div>
            </div>
            <div class="right-controls">
                <div class="speed-btn" id="speed-btn">x1</div>
                <div class="coin-rain-btn" id="coin-rain-btn">
                    <i class="fas fa-cloud-rain"></i>
                </div>
                <div class="pause-btn" id="pause-btn">
                    <i class="fas fa-pause" id="pause-icon"></i>
                </div>
                <div class="theme-toggle" id="theme-toggle">
                    <i class="fas fa-sun"></i>
                </div>
            </div>
        </div>

        <div class="game-area">
            <canvas id="game-canvas"></canvas>
        </div>

        <div class="joystick-panel">
            <canvas id="joystick-canvas" width="200" height="200"></canvas>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
